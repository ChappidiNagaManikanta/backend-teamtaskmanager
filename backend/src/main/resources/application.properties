spring.application.name=taskmanager

# Server port (Railway uses dynamic PORT)
server.port=${PORT:8080}

# ===============================
# DATABASE CONFIG (LOCAL + RAILWAY)
# ===============================

# For LOCAL
spring.datasource.url=${SPRING_DATASOURCE_URL:mysql://root:UUryuZPPGSmLpaNEezEcQHRVRmhQnEqg@mysql.railway.internal:3306/railway}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:UUryuZPPGSmLpaNEezEcQHRVRmhQnEqg}

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# JWT CONFIG
# ===============================
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
jwt.expiration=${JWT_EXPIRATION:86400000}

# ===============================
# LOGGING (Optional but useful)
# ===============================
logging.level.org.springframework=INFO
logging.level.org.hibernate.SQL=DEBUG

# ===============================
# CORS (if using React frontend)
# ===============================
spring.web.cors.allowed-origins=*
spring.web.cors.allowed-methods=GET,POST,PUT,DELETE
spring.web.cors.allowed-headers=*